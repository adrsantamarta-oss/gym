// ─────────────────────────────────────────
let curDay = 0;
let curView = 'rutina';
let curFoodDay = 0;
let prog = JSON.parse(localStorage.getItem('gp') || '{}');
const save = () => localStorage.setItem('gp', JSON.stringify(prog));
const key = (d,e) => `${d}-${e}`;
const dayDone = d => DIAS[d].ejercicios.every((_,i) => prog[key(d,i)]);

// ─────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────
function buildTabs() {
  const c = document.getElementById('tabs');
  c.innerHTML = '';
  DIAS.forEach((d,i) => {
    const b = document.createElement('button');
    b.className = 'tab' + (i===curDay?' active':'') + (dayDone(i)?' done':'');
    b.style.setProperty('--tc', d.color);
    b.innerHTML = `<span class="tnum">${i+1}</span><span style="font-size:8px">${d.tag}</span><span class="tdot"></span>`;
    b.onclick = () => { curDay=i; render(); };
    c.appendChild(b);
  });
}

function updateHeader() {
  const d = DIAS[curDay];
  document.getElementById('day-pill').textContent = d.dia;
  document.getElementById('day-pill').style.cssText = `border-color:${d.color};color:${d.color};background:color-mix(in srgb,${d.color} 10%,transparent)`;
  document.getElementById('prog-fill').style.setProperty('background', d.color);
  const tot = d.ejercicios.length;
  const done = d.ejercicios.filter((_,i) => prog[key(curDay,i)]).length;
  const pct = tot ? (done/tot)*100 : 0;
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-num').textContent = `${done}/${tot}`;
  document.getElementById('prog-num').style.color = pct===100 ? 'var(--green)' : 'var(--muted)';
}

function renderRutina() {
  const d = DIAS[curDay];
  let h = `<div class="day-hdr fadein" style="--dc:${d.color}">
    <div class="dtag">${d.tag}</div>
    <h2>${d.nombre}</h2>
    <div class="dsub">${d.nota}</div>
  </div>`;
  d.ejercicios.forEach((ej,i) => {
    const done = !!prog[key(curDay,i)];
    h += `<div class="ex fadein${done?' done':''}" onclick="toggle(${i})" style="--dc:${d.color}" style="animation-delay:${i*0.04}s">
      <div class="ex-inner">
        <div class="chk">${done?'✓':''}</div>
        <div class="ex-body">
          <div class="ex-name">${ej.n}</div>
          <div class="ex-badges">
            <span class="bdg col">${ej.s} series</span>
            <span class="bdg neu">${ej.r} reps</span>
            <span class="bdg tip">${ej.tipo}</span>
          </div>
          <div class="ex-nota">→ ${ej.nota}</div>
        </div>
      </div>
    </div>`;
  });
  h += `<div style="text-align:center;margin-top:10px">
    <button onclick="resetDay()" style="background:var(--s2);border:1px solid var(--border);color:var(--muted);font-family:var(--font);font-size:11px;font-weight:700;padding:7px 16px;border-radius:20px;cursor:pointer">↺ Reiniciar día</button>
  </div>`;
  return h;
}

function renderComida() {
  // Week day tabs
  const dias = ['L','M','X','J','V','S','D'];
  const nombres = ['LUN','MAR','MIÉ','JUE','VIE','SÁB','DOM'];
  let h = '<div class="week-tabs">';
  dias.forEach((d,i) => {
    h += `<button class="wtab${i===curFoodDay?' active':''}" onclick="setFoodDay(${i})">${nombres[i]}</button>`;
  });
  h += '</div>';

  const fd = SEMANA[curFoodDay];
  // Macro summary
  const totalP = fd.comidas.reduce((a,c)=>a+c.p,0);
  const totalC = fd.comidas.reduce((a,c)=>a+c.c,0);
  const totalG = fd.comidas.reduce((a,c)=>a+c.g,0);
  h += `<div class="macro-sum fadein">
    <div class="macro-sum-title">RESUMEN NUTRICIONAL · ${fd.dia} · ${fd.kcal} KCAL</div>
    <div class="macro-bars">
      <div class="mbar-row"><span class="mbar-label" style="color:#3ecf6e">🥩 Proteína</span><div class="mbar-bg"><div class="mbar-fill" style="width:${Math.min(totalP/160*100,100)}%;background:#3ecf6e"></div></div><span class="mbar-val" style="color:#3ecf6e">${totalP}g</span></div>
      <div class="mbar-row"><span class="mbar-label" style="color:#60a5fa">🍚 Carbos</span><div class="mbar-bg"><div class="mbar-fill" style="width:${Math.min(totalC/280*100,100)}%;background:#60a5fa"></div></div><span class="mbar-val" style="color:#60a5fa">${totalC}g</span></div>
      <div class="mbar-row"><span class="mbar-label" style="color:#f59e0b">🥑 Grasas</span><div class="mbar-bg"><div class="mbar-fill" style="width:${Math.min(totalG/80*100,100)}%;background:#f59e0b"></div></div><span class="mbar-val" style="color:#f59e0b">${totalG}g</span></div>
    </div>
  </div>`;

  h += `<div class="day-food fadein">`;
  fd.comidas.forEach(m => {
    h += `<div class="meal">
      <div class="meal-time">${m.t}</div>
      <div class="meal-name">${m.n}</div>
      <div class="meal-desc">${m.d}</div>
      <div class="meal-macros">
        <span class="macro p">🥩 ${m.p}g prot</span>
        <span class="macro c">🍚 ${m.c}g carbos</span>
        <span class="macro g">🥑 ${m.g}g grasa</span>
      </div>
    </div>`;
  });
  h += '</div>';

  h += `<div class="tip-card fadein">📅 <strong>Prep dominical:</strong> Cocina arroz, pechuga, lentejas y patata el domingo. Guarda en tupers por días en la nevera. Así solo calientas en la semana.</div>`;
  h += `<div class="tip-card fadein">⚖️ <strong>Objetivo semanal:</strong> ~2.300 kcal/día con ~150g proteína. En déficit de ~500 kcal respecto a tu mantenimiento de ~2.800 kcal.</div>`;
  return h;
}

function renderTips() {
  let h = '<div class="slabel">CONSEJOS CLAVE</div>';
  TIPS.forEach(t => { h += `<div class="tip-card fadein">${t}</div>`; });
  return h;
}

function renderEquipo() {
  let h = '<div class="slabel">TU EQUIPO</div>';
  h += `<div class="eq-card fadein">
    <div class="eq-row"><span class="eq-icon">🏋️</span><div class="eq-txt"><strong>Barra larga</strong><span>Press banca, peso muerto, remo, press militar</span></div></div>
    <div class="eq-row"><span class="eq-icon">💪</span><div class="eq-txt"><strong>2 barras cortas (mancuernas)</strong><span>Curl, elevaciones, remo 1 brazo, pull-over</span></div></div>
    <div class="eq-row"><span class="eq-icon">🔵</span><div class="eq-txt"><strong>6 discos × 5kg = 30kg</strong><span>Base del peso en barra larga</span></div></div>
    <div class="eq-row"><span class="eq-icon">🟡</span><div class="eq-txt"><strong>4 discos × 2.5kg = 10kg</strong><span>Ajuste intermedio</span></div></div>
    <div class="eq-row"><span class="eq-icon">⚪</span><div class="eq-txt"><strong>4 discos × 1.25kg = 5kg</strong><span>Microajuste de progresión</span></div></div>
    <div class="eq-row"><span class="eq-icon">📊</span><div class="eq-txt"><strong>Total: ~45kg disponibles</strong><span>Mancuerna máx ~15kg · Barra máx ~30kg total</span></div></div>
  </div>`;
  h += '<div class="slabel">COMBINACIONES DE PESO</div>';
  h += `<div class="eq-card fadein">
    <div class="eq-row"><span class="eq-icon">1️⃣</span><div class="eq-txt"><strong>Mancuerna ligera · 2.5kg</strong><span>1.25+1.25 — Elevaciones laterales, curl ligero</span></div></div>
    <div class="eq-row"><span class="eq-icon">2️⃣</span><div class="eq-txt"><strong>Mancuerna media · 5kg</strong><span>2.5+2.5 — Curl bíceps, press hombro</span></div></div>
    <div class="eq-row"><span class="eq-icon">3️⃣</span><div class="eq-txt"><strong>Mancuerna fuerte · 7.5kg</strong><span>5+2.5 — Remo 1 brazo, pull-over</span></div></div>
    <div class="eq-row"><span class="eq-icon">4️⃣</span><div class="eq-txt"><strong>Mancuerna máxima · 12.5kg</strong><span>5+5+2.5 — Remo pesado, zancada</span></div></div>
    <div class="eq-row"><span class="eq-icon">5️⃣</span><div class="eq-txt"><strong>Barra pesada · ~25-30kg</strong><span>Peso muerto, sentadilla, press militar</span></div></div>
  </div>`;
  return h;
}

function render() {
  buildTabs();
  updateHeader();
  const main = document.getElementById('main');
  if (curView==='rutina') main.innerHTML = renderRutina();
  else if (curView==='comida') main.innerHTML = renderComida();
  else if (curView==='tips') main.innerHTML = renderTips();
  else main.innerHTML = renderEquipo();
  ['rutina','comida','tips','equipo'].forEach(v => {
    document.getElementById('nb-'+v).classList.toggle('active', v===curView);
  });
  main.scrollTo(0,0);
  // set nav accent color per view
  const colors = {rutina:'#FF4D4D',comida:'#f59e0b',tips:'#60a5fa',equipo:'#C084FC'};
  document.documentElement.style.setProperty('--accent-nav', colors[curView]);
}

function toggle(idx) {
  const k = key(curDay,idx);
  prog[k] = !prog[k];
  save(); render();
  if (dayDone(curDay)) {
    const b = document.getElementById('banner');
    b.classList.add('show');
    setTimeout(()=>b.classList.remove('show'),2500);
  }
}

function resetDay() {
  DIAS[curDay].ejercicios.forEach((_,i) => delete prog[key(curDay,i)]);
  save(); render();
}

function setView(v) { curView=v; render(); }
function setFoodDay(i) { curFoodDay=i; render(); }

render();
</script>
</body>
</html>
