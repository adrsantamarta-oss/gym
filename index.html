<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="GYM CASA"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>GYM CASA 💪</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #080808;
    --surface: #111114;
    --surface2: #18181c;
    --border: #222226;
    --text: #f2f2f0;
    --muted: #555560;
    --accent: #FF4D4D;
    --green: #2ecc71;
    --radius: 14px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overscroll-behavior: none;
    overflow-x: hidden;
  }
  body { display: flex; flex-direction: column; }

  /* ── HEADER ── */
  #header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 18px 10px;
    display: flex; flex-direction: column; gap: 6px;
  }
  #header-top { display: flex; justify-content: space-between; align-items: center; }
  #app-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--text); }
  #day-label { font-size: 11px; font-weight: 700; letter-spacing: 3px; color: var(--accent); transition: color .3s; }
  #reset-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 700;
    padding: 6px 12px; border-radius: 20px; cursor: pointer;
    transition: all .2s;
  }
  #reset-btn:active { transform: scale(.95); }

  /* progress bar */
  #prog-wrap { display: flex; align-items: center; gap: 10px; }
  #prog-bar-bg { flex: 1; height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; }
  #prog-bar { height: 100%; width: 0%; border-radius: 3px; background: var(--accent); transition: width .4s ease, background .3s; }
  #prog-text { font-size: 11px; font-weight: 700; color: var(--muted); min-width: 32px; text-align: right; transition: color .3s; }

  /* ── DAY TABS ── */
  #tabs-scroll {
    overflow-x: auto; white-space: nowrap;
    padding: 12px 16px;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #tabs-scroll::-webkit-scrollbar { display: none; }
  .tab-btn {
    display: inline-flex; flex-direction: column; align-items: center;
    gap: 3px; padding: 8px 16px;
    margin-right: 6px;
    border-radius: 10px; border: 1.5px solid var(--border);
    background: var(--surface); color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 700;
    letter-spacing: 1.5px; cursor: pointer;
    transition: all .2s; user-select: none;
  }
  .tab-btn .tab-num { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; }
  .tab-btn.active { color: var(--tab-color); border-color: var(--tab-color); background: color-mix(in srgb, var(--tab-color) 12%, transparent); }
  .tab-btn .tab-done-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--green); opacity: 0;
    transition: opacity .3s;
  }
  .tab-btn.done .tab-done-dot { opacity: 1; }

  /* ── CONTENT ── */
  #content { flex: 1; overflow-y: auto; padding: 16px 14px 100px; }

  /* day header card */
  .day-header {
    border-radius: var(--radius); padding: 18px 18px 14px;
    margin-bottom: 14px;
    background: color-mix(in srgb, var(--day-color) 10%, var(--surface));
    border: 1px solid color-mix(in srgb, var(--day-color) 25%, transparent);
  }
  .day-header h2 { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 2px; color: var(--text); }
  .day-header .day-sub { font-size: 11px; font-weight: 500; color: var(--muted); margin-top: 2px; letter-spacing: .5px; }

  /* ── EXERCISE CARDS ── */
  .ex-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    transition: all .25s;
    cursor: pointer;
    active-scale: .98;
  }
  .ex-card:active { transform: scale(.985); }
  .ex-card.done { background: color-mix(in srgb, var(--green) 6%, var(--surface)); border-color: color-mix(in srgb, var(--green) 20%, var(--border)); }
  .ex-inner { display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px; }
  .ex-check {
    width: 24px; height: 24px; border-radius: 7px; flex-shrink: 0; margin-top: 1px;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: var(--green);
    transition: all .25s; background: transparent;
  }
  .ex-card.done .ex-check { background: color-mix(in srgb, var(--green) 18%, transparent); border-color: var(--green); }
  .ex-info { flex: 1; }
  .ex-name {
    font-weight: 700; font-size: 14px; color: var(--text);
    transition: color .2s; line-height: 1.3; margin-bottom: 6px;
  }
  .ex-card.done .ex-name { color: var(--muted); text-decoration: line-through; }
  .ex-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
  .badge {
    font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 5px;
    background: color-mix(in srgb, var(--badge-color) 15%, var(--surface2));
    color: var(--badge-color);
  }
  .badge.gray { --badge-color: #888; }
  .ex-nota { font-size: 11px; color: var(--muted); font-style: italic; line-height: 1.5; }

  /* ── SECTION TITLE ── */
  .section-title {
    font-size: 10px; font-weight: 700; letter-spacing: 3px;
    color: var(--muted); margin: 20px 0 10px 2px;
  }

  /* ── TIPS ── */
  .tip-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 11px 14px;
    font-size: 12px; color: #777; line-height: 1.6; margin-bottom: 8px;
  }

  /* ── EQUIPO ── */
  .equipo-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
  }
  .equipo-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
  .equipo-row:last-child { border-bottom: none; }
  .equipo-row .icon { font-size: 18px; }
  .equipo-row strong { color: var(--text); }
  .equipo-row span { color: var(--muted); font-size: 12px; }

  /* ── COMPLETION BANNER ── */
  #done-banner {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--green); color: #000; font-weight: 800; font-size: 13px;
    padding: 10px 22px; border-radius: 30px; letter-spacing: 1px;
    opacity: 0; pointer-events: none;
    transition: all .4s cubic-bezier(.34,1.56,.64,1);
    white-space: nowrap; z-index: 200;
  }
  #done-banner.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── BOTTOM NAV ── */
  #bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: color-mix(in srgb, var(--bg) 92%, transparent);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-around; align-items: center;
    padding: 8px 0 max(8px, env(safe-area-inset-bottom));
    z-index: 100;
  }
  .nav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 6px 18px; border-radius: 10px; cursor: pointer;
    border: none; background: transparent; color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 700;
    letter-spacing: 1px; transition: all .2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn .nav-icon { font-size: 20px; }

  /* scrollbar */
  #content::-webkit-scrollbar { width: 4px; }
  #content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div id="header-top">
    <div>
      <div id="app-title">GYM CASA</div>
      <div id="day-label">DÍA 1 · PECHO + TRÍCEPS</div>
    </div>
    <button id="reset-btn" onclick="resetDay()">↺ Reset</button>
  </div>
  <div id="prog-wrap">
    <div id="prog-bar-bg"><div id="prog-bar"></div></div>
    <div id="prog-text">0/0</div>
  </div>
</div>

<!-- TABS -->
<div id="tabs-scroll"></div>

<!-- CONTENT -->
<div id="content"></div>

<!-- DONE BANNER -->
<div id="done-banner">✓ ¡DÍA COMPLETADO!</div>

<!-- BOTTOM NAV -->
<div id="bottom-nav">
  <button class="nav-btn active" id="nav-rutina" onclick="showView('rutina')">
    <span class="nav-icon">🏋️</span>RUTINA
  </button>
  <button class="nav-btn" id="nav-tips" onclick="showView('tips')">
    <span class="nav-icon">💡</span>TIPS
  </button>
  <button class="nav-btn" id="nav-equipo" onclick="showView('equipo')">
    <span class="nav-icon">⚙️</span>EQUIPO
  </button>
</div>

<script>
const DIAS = [
  {
    dia:"DÍA 1", nombre:"PECHO + TRÍCEPS", color:"#FF4D4D",
    ejercicios:[
      {n:"Press de banca con barra", s:4, r:"8–10", nota:"Agarre ancho, baja controlado hasta el pecho"},
      {n:"Press banca agarre cerrado", s:4, r:"10–12", nota:"Manos juntas, activa el tríceps al empujar"},
      {n:"Plancha normal", s:4, r:"12–15", nota:"Codos a 45°, no abras los codos al bajar"},
      {n:"Fondos entre sillas", s:3, r:"12–15", nota:"Inclina el torso al frente para activar más pecho"},
      {n:"Pull-over con mancuerna", s:3, r:"12", nota:"Estira bien el pecho al bajar, respira profundo"},
    ]
  },
  {
    dia:"DÍA 2", nombre:"ESPALDA + BÍCEPS", color:"#4D9FFF",
    ejercicios:[
      {n:"Peso muerto con barra", s:4, r:"8–10", nota:"Espalda recta, empuja el suelo, no el peso"},
      {n:"Remo inclinado con barra", s:4, r:"10–12", nota:"Tira hacia el ombligo, no hacia el pecho"},
      {n:"Remo mancuerna 1 brazo", s:3, r:"12 c/lado", nota:"Rodilla apoyada, codo pegado al cuerpo"},
      {n:"Curl bíceps con barra", s:4, r:"10–12", nota:"No balancees el torso, movimiento puro de codo"},
      {n:"Curl martillo con mancuerna", s:3, r:"12–15", nota:"Muñeca neutra, movimiento lento y controlado"},
    ]
  },
  {
    dia:"DÍA 3", nombre:"PIERNAS + GLÚTEOS", color:"#FFB84D",
    ejercicios:[
      {n:"Sentadilla con barra", s:4, r:"10–12", nota:"Baja hasta paralelo, rodillas hacia fuera"},
      {n:"Peso muerto rumano con barra", s:4, r:"10–12", nota:"Cadera atrás, siente el estiramiento del femoral"},
      {n:"Zancada con mancuernas", s:3, r:"12 c/lado", nota:"Rodilla trasera cerca del suelo, torso recto"},
      {n:"Sentadilla sumo con mancuerna", s:3, r:"15", nota:"Pies muy abiertos, activa glúteo al subir"},
      {n:"Glúteo puente con peso", s:4, r:"15–20", nota:"Pausa 1 seg arriba, disco sobre caderas"},
    ]
  },
  {
    dia:"DÍA 4", nombre:"HOMBROS + TRAPECIO", color:"#C084FC",
    ejercicios:[
      {n:"Press militar con barra (de pie)", s:4, r:"8–10", nota:"Core apretado, no arquees la espalda lumbar"},
      {n:"Elevación lateral con mancuerna", s:4, r:"14–16", nota:"Codos ligeramente doblados, sin impulso"},
      {n:"Elevación frontal con mancuerna", s:3, r:"12", nota:"Alterna brazos, sube hasta la altura de los ojos"},
      {n:"Encogimiento de hombros con barra", s:4, r:"15", nota:"Sube y mantén 1 seg arriba, no ruedes los hombros"},
      {n:"Remo al mentón con barra", s:3, r:"12", nota:"Codos altos, tira hacia la barbilla"},
    ]
  },
  {
    dia:"DÍA 5", nombre:"CORE + FULL BODY", color:"#34D399",
    ejercicios:[
      {n:"Peso muerto (peso ligero, técnica)", s:3, r:"15", nota:"Activación general, enfócate en la forma perfecta"},
      {n:"Elevación de cadera (abdominal)", s:4, r:"15–20", nota:"Piernas rectas arriba, levanta la cadera del suelo"},
      {n:"Plancha isométrica", s:3, r:"40 seg", nota:"Cuerpo en línea recta, respira lento y constante"},
      {n:"Crunch con disco en el pecho", s:4, r:"15", nota:"Contrae el abdomen, no el cuello al subir"},
      {n:"Russian twist con disco", s:3, r:"20 (10 c/lado)", nota:"Gira desde el core, pies levantados si puedes"},
      {n:"Extensión de espalda en suelo", s:3, r:"15", nota:"Despega pecho y piernas a la vez, movimiento lento"},
    ]
  }
];

const TIPS = [
  "🔄 Descansa 60–90 seg entre series para quemar grasa / 2–3 min para ganar fuerza máxima",
  "📈 Sube el peso cuando puedas completar todas las reps con buena técnica 2 días seguidos",
  "💧 Hidratación: bebe agua antes, durante y después. Al menos 2L al día",
  "🍽️ Come suficiente proteína: 1.6–2g por kg de peso corporal al día (huevo, pollo, legumbres)",
  "😴 El músculo crece mientras descansas — duerme 7–8 horas de calidad",
  "📅 Descansa sábado y domingo, o intercambia un día de descanso con el Día 5",
  "🔥 Para bajar grasa: deficit calórico de 300–500 kcal/día. Sin deficit no hay pérdida de grasa",
  "⚡ Calienta 5–10 min antes: movilidad articular, saltos suaves, rotaciones",
];

let currentDay = 0;
let currentView = 'rutina';
let progress = JSON.parse(localStorage.getItem('gym_progress') || '{}');

function save() { localStorage.setItem('gym_progress', JSON.stringify(progress)); }

function getKey(d, e) { return `${d}-${e}`; }

function isDayDone(d) {
  return DIAS[d].ejercicios.every((_, i) => progress[getKey(d,i)]);
}

function buildTabs() {
  const container = document.getElementById('tabs-scroll');
  container.innerHTML = '';
  DIAS.forEach((dia, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === currentDay ? ' active' : '') + (isDayDone(i) ? ' done' : '');
    btn.style.setProperty('--tab-color', dia.color);
    btn.innerHTML = `<span class="tab-num">${i+1}</span><span>${dia.dia.replace('DÍA ','DÍA ')}</span><span class="tab-done-dot"></span>`;
    btn.onclick = () => { currentDay = i; render(); };
    container.appendChild(btn);
  });
}

function updateHeader() {
  const dia = DIAS[currentDay];
  document.getElementById('day-label').textContent = `${dia.dia} · ${dia.nombre}`;
  document.getElementById('day-label').style.color = dia.color;
  document.getElementById('prog-bar').style.background = dia.color;

  const total = dia.ejercicios.length;
  const done = dia.ejercicios.filter((_,i) => progress[getKey(currentDay,i)]).length;
  const pct = total ? (done/total)*100 : 0;
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `${done}/${total}`;
  document.getElementById('prog-text').style.color = pct === 100 ? 'var(--green)' : 'var(--muted)';
}

function renderRutina() {
  const dia = DIAS[currentDay];
  let html = `<div class="day-header" style="--day-color:${dia.color}">
    <h2>${dia.nombre}</h2>
    <div class="day-sub">${dia.ejercicios.length} ejercicios · Toca para marcar completado</div>
  </div>`;

  dia.ejercicios.forEach((ej, i) => {
    const done = !!progress[getKey(currentDay,i)];
    html += `<div class="ex-card${done?' done':''}" onclick="toggle(${i})" style="--day-color:${dia.color}">
      <div class="ex-inner">
        <div class="ex-check">${done ? '✓' : ''}</div>
        <div class="ex-info">
          <div class="ex-name">${ej.n}</div>
          <div class="ex-badges">
            <span class="badge" style="--badge-color:${dia.color}">${ej.s} series</span>
            <span class="badge gray">${ej.r} reps</span>
          </div>
          <div class="ex-nota">→ ${ej.nota}</div>
        </div>
      </div>
    </div>`;
  });
  return html;
}

function renderTips() {
  let html = '<div class="section-title">CONSEJOS CLAVE</div>';
  TIPS.forEach(t => { html += `<div class="tip-card">${t}</div>`; });
  return html;
}

function renderEquipo() {
  return `
  <div class="section-title">TU EQUIPO</div>
  <div class="equipo-card">
    <div class="equipo-row"><span class="icon">🏋️</span><div><strong>Barra larga</strong><br><span>Press de banca, peso muerto, remo, press militar</span></div></div>
    <div class="equipo-row"><span class="icon">💪</span><div><strong>2 barras cortas</strong><br><span>Mancuernas ajustables con discos</span></div></div>
    <div class="equipo-row"><span class="icon">🔵</span><div><strong>6× 5kg</strong><br><span>= 30kg en discos de 5kg</span></div></div>
    <div class="equipo-row"><span class="icon">🟡</span><div><strong>4× 2.5kg</strong><br><span>= 10kg en discos de 2.5kg</span></div></div>
    <div class="equipo-row"><span class="icon">⚪</span><div><strong>4× 1.25kg</strong><br><span>= 5kg en discos de 1.25kg</span></div></div>
    <div class="equipo-row"><span class="icon">📊</span><div><strong>Total disponible: ~45kg</strong><br><span>Mancuerna máx ~15kg · Barra larga máx ~30kg</span></div></div>
  </div>
  <div class="section-title" style="margin-top:20px">COMBINACIONES ÚTILES</div>
  <div class="tip-card">🏋️ <strong>Barra de calentamiento</strong> (sólo barra): ~5kg · Para aprender técnica</div>
  <div class="tip-card">💪 <strong>Mancuerna ligera</strong>: 1.25+1.25 = 2.5kg c/lado · Elevaciones laterales</div>
  <div class="tip-card">💪 <strong>Mancuerna media</strong>: 2.5+2.5 = 5kg c/lado · Curl, press hombro</div>
  <div class="tip-card">💪 <strong>Mancuerna fuerte</strong>: 5+5 = 10kg c/lado · Remo, press inclinado</div>
  <div class="tip-card">🏋️ <strong>Barra pesada</strong>: 2×5+2×5+barra ≈ 25kg · Peso muerto, sentadilla</div>`;
}

function render() {
  buildTabs();
  updateHeader();
  const content = document.getElementById('content');
  if (currentView === 'rutina') content.innerHTML = renderRutina();
  else if (currentView === 'tips') content.innerHTML = renderTips();
  else content.innerHTML = renderEquipo();

  // nav active state
  ['rutina','tips','equipo'].forEach(v => {
    document.getElementById('nav-'+v).classList.toggle('active', v === currentView);
  });

  content.scrollTo(0,0);
}

function toggle(ejIdx) {
  const key = getKey(currentDay, ejIdx);
  progress[key] = !progress[key];
  save();
  render();

  if (isDayDone(currentDay)) {
    const banner = document.getElementById('done-banner');
    banner.classList.add('show');
    setTimeout(() => banner.classList.remove('show'), 2500);
  }
}

function resetDay() {
  DIAS[currentDay].ejercicios.forEach((_,i) => { delete progress[getKey(currentDay,i)]; });
  save(); render();
}

function showView(v) {
  currentView = v; render();
}

// init
render();
</script>
</body>
</html>
